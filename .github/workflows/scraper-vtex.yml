name: Scrapers VTEX

on:
  schedule:
    # Cada 30 minutos (horas pico chilenas: 8am-10pm CLT = 11:00-01:00 UTC)
    - cron: "*/30 11-23,0-1 * * *"
  workflow_dispatch:   # Permite ejecución manual desde GitHub Actions

jobs:
  scrape-vtex:
    name: VTEX — Jumbo / Líder / Santa Isabel
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run VTEX scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          VTEX_MAX_PAGES: "4"
          VTEX_DELAY_MS: "300"
          LOG_LEVEL: "INFO"
        run: |
          cd backend
          python run_vtex.py

      # El step siempre termina con éxito (exit 0 en run_vtex.py)
      # Si hay fallos parciales, aparecen en los logs pero no rompen el CI
