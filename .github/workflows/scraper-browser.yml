name: Scrapers Browser

on:
  schedule:
    # Cada 6 horas — browser scrapers son más lentos y pesados que VTEX
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape-browser:
    name: Browser — Tottus / Unimarc / aCuenta
    runs-on: ubuntu-latest
    timeout-minutes: 45    # Playwright puede tardar bastante en CI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          cd backend
          python -m playwright install chromium --with-deps

      - name: Run browser scrapers
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TOTTUS_COOKIE: ${{ secrets.TOTTUS_COOKIE }}
          LIDER_COOKIE: ${{ secrets.LIDER_COOKIE }}
          UNIMARC_COOKIE: ${{ secrets.UNIMARC_COOKIE }}
          ACUENTA_COOKIE: ${{ secrets.ACUENTA_COOKIE }}
          BROWSER_MAX_CONCURRENT: "1"
          LOG_LEVEL: "INFO"
        run: |
          cd backend
          python run_browser.py
