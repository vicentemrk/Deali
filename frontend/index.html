<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Deali — Ofertas de Supermercados Chile</title>
    <meta name="description" content="Compara las mejores ofertas de Jumbo, Líder, Tottus, Unimarc, aCuenta y Santa Isabel. Actualizado cada 30 minutos." />
    <meta name="theme-color" content="#92400E" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0C0900" media="(prefers-color-scheme: dark)" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Fonts: Mineral Dorado ────────────────────────────────────── -->
    <!-- Preconnect critical para Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Josefin Sans 600/700 (display) — non-render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Raleway 400/500/600 (body) — non-render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Geist Mono 400/500 (precios) — non-render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
    </noscript>

    <!-- ── Critical inline CSS: prevent FOUC ───────────────────────── -->
    <style>
      /* Fallback system fonts para evitar CLS */
      body {
        background-color: #F3F4F6;
        color: #1F2937;
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
      }
      /* Loading spinner mientras carga React */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      #root:empty::after {
        content: '';
        width: 28px;
        height: 28px;
        border: 2px solid #E5E7EB;
        border-top-color: #111827;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Deali" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
