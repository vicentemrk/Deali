[tool.pytest.ini_options]
# asyncio_mode="auto": todos los tests async corren sin decorador extra
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = "--cov=scrapers --cov=config --cov-report=term-missing -v"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B"]
ignore = [
    "B008",   # function call in default argument (Pydantic usa esto)
    "N999",   # module name (run_vtex.py tiene guión bajo)
]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
